name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: node-runtime-version.txt
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Stub opencode server bundle for CI
        run: |
          mkdir -p thirdparty/opencode/packages/opencode/dist/node
          cat > thirdparty/opencode/packages/opencode/dist/node/node.js << 'STUB'
          export const Log = { init: async () => {} };
          export const Server = { listen: async () => ({ url: new URL("http://localhost:0"), stop: () => {} }) };
          STUB

      - name: Typecheck + build
        run: npm run build

      - name: Unit tests
        run: npm run test:run

  rust-server:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      - name: Format (server)
        working-directory: server
        run: cargo fmt --check

      - name: Clippy (server)
        working-directory: server
        run: cargo clippy -- -D warnings

      - name: Tests (server)
        working-directory: server
        run: cargo test
