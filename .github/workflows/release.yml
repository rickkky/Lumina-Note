name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  check-changelog:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: node-runtime-version.txt

      - name: Install dependencies
        run: npm ci

      - name: Check changelog exists for this version
        run: npx ts-node scripts/parse_changelog.ts check "${{ github.ref_name }}"

  # Pre-create the GitHub release as a DRAFT before the matrix kicks off.
  # Why draft and not published: electron-builder 26.x's GitHub publisher
  # only treats DRAFT releases as "upload here, then promote." If a
  # published release already exists for the tag, electron-builder still
  # POSTs to /releases (looking for a draft slot) and crashes with HTTP 422
  # already_exists — exactly what blew up v1.2.1 and v1.3.0. The draft is
  # promoted to published by the final `publish-release` job after all
  # matrix uploads complete, so there's no parallel publish-race either.
  create-release:
    needs: check-changelog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: node-runtime-version.txt

      - name: Install dependencies
        run: npm ci

      - name: Create draft release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — matrix builds will upload to it"
            exit 0
          fi
          NOTES="$(npx ts-node scripts/parse_changelog.ts get "$TAG")"
          gh release create "$TAG" --title "$TAG" --notes "$NOTES" --draft

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            script: dist:mac
          - platform: windows-latest
            script: dist:win
          - platform: ubuntu-latest
            script: dist:linux

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: node-runtime-version.txt
          cache: 'npm'

      # Manual bun install with --retry-all-errors. The official
      # `oven-sh/setup-bun@v2` gives up after 3 attempts; we hit GitHub's
      # release CDN returning 502 on the v1.3.2 Windows build and lost the
      # whole platform's run. curl with `--retry 8 --retry-all-errors`
      # handles transient 5xx and connection drops up to ~10 minutes total.
      - name: Setup Bun
        shell: bash
        env:
          BUN_VERSION: "1.3.13"
        run: |
          set -euo pipefail
          case "$RUNNER_OS" in
            Linux)   target="bun-linux-x64";      binname="bun";;
            macOS)   target="bun-darwin-aarch64"; binname="bun";;
            Windows) target="bun-windows-x64";    binname="bun.exe";;
            *) echo "Unsupported runner: $RUNNER_OS"; exit 1;;
          esac
          url="https://github.com/oven-sh/bun/releases/download/bun-v${BUN_VERSION}/${target}.zip"
          install_dir="$HOME/.bun/bin"
          mkdir -p "$install_dir"
          tmp="$(mktemp -d)"
          echo "Downloading $url ..."
          curl -fsSL \
               --retry 8 --retry-delay 10 --retry-max-time 600 \
               --retry-all-errors \
               -o "$tmp/bun.zip" "$url"
          unzip -o -q "$tmp/bun.zip" -d "$tmp/extract"
          cp "$tmp/extract/${target}/$binname" "$install_dir/$binname"
          chmod +x "$install_dir/$binname" || true
          echo "$install_dir" >> "$GITHUB_PATH"
          "$install_dir/$binname" --version

      # Opencode is the in-process AI server bundled into the Electron main
      # process. Its source isn't vendored in this repo (gitignored under
      # thirdparty/) — pin it at a known-good commit and check it out fresh
      # every release. Bumping opencode = update this `ref` and verify
      # locally with `npm run opencode:smoke`.
      - name: Checkout opencode at pinned commit
        uses: actions/checkout@v6
        with:
          repository: anomalyco/opencode
          ref: 6aa475fcac39cacda4730142314985c64b200bb5
          path: thirdparty/opencode

      - name: Install Lumina dependencies
        run: npm ci

      - name: Install opencode dependencies
        shell: bash
        working-directory: thirdparty/opencode
        run: bun install --frozen-lockfile

      # Produces thirdparty/opencode/packages/opencode/dist/node/node.js
      # (~18MB) plus the tree-sitter wasm files that
      # electron.vite.config.ts copies into out/main during the next step.
      # This replaces the stub that v1.2.0–v1.3.1 shipped, where the bundle
      # at this path was a fake `Server.listen` returning localhost:0 — so
      # every released binary's AI chat failed at startup with
      # "opencode server never reported ready from main process".
      - name: Build opencode server bundle
        shell: bash
        run: npm run opencode:bundle

      # Stage the platform-specific native node-pty package(s) into
      # release-staging/native/. The script reads from the dev-only
      # thirdparty/ tree but writes to a clean staging path that
      # electron-builder.yml references — so the production build config
      # never depends on developer-only directory layout. On macOS the
      # script also pulls darwin-x64 from npm so the x64 dmg slice has
      # its native binary (bun on the arm64 runner only installed arm64).
      - name: Stage native modules for electron-builder
        shell: bash
        run: npm run stage:native

      - name: Build renderer + main
        run: npm run build

      # Build only — never publish from electron-builder. We upload assets
      # ourselves below via `gh release upload`, which sidesteps electron-
      # builder's GitHub publisher entirely (the source of the 422 race).
      - name: Package via electron-builder (no publish)
        shell: bash
        run: |
          set -euo pipefail
          # GitHub exposes missing secrets as empty strings. electron-builder
          # still treats an empty CSC_LINK as an explicit certificate path on
          # macOS, which breaks ad-hoc signing. Drop empty signing variables
          # before invoking the packager while preserving real secrets.
          for key in \
            APPLE_ID APPLE_ID_PASSWORD APPLE_TEAM_ID \
            CSC_LINK CSC_KEY_PASSWORD \
            WIN_CSC_LINK WIN_CSC_KEY_PASSWORD
          do
            if [ -z "${!key:-}" ]; then
              unset "$key"
            fi
          done
          npm run ${{ matrix.script }} -- --publish never
        env:
          # macOS uses ad-hoc signing (electron-builder identity "-"), not an
          # Apple Developer ID cert. Disable identity auto-discovery so empty
          # CSC_LINK values are not treated as certificate files.
          CSC_IDENTITY_AUTO_DISCOVERY: false
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      # Each matrix runner uploads ONLY its own platform artifacts plus the
      # matching `latest*.yml` electron-updater feed file. No two runners
      # touch the same filename, so concurrent uploads are race-free.
      - name: Validate updater asset references
        run: npm run release:validate-assets

      - name: Upload platform artifacts to draft release
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          # Allowed extensions per platform — kept narrow to skip
          # builder-debug.yml, builder-effective-config.yaml, and the
          # unpacked .app / linux-unpacked / win-unpacked directories.
          assets=(
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.blockmap
            release/latest*.yml
          )
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No assets matched in release/ — nothing to upload"
            exit 1
          fi
          echo "Uploading ${#assets[@]} files to $TAG:"
          printf '  %s\n' "${assets[@]}"
          gh release upload "$TAG" "${assets[@]}" --clobber

  # Promote the draft to published once every platform has uploaded its
  # assets. This avoids the parallel-publish race that would happen if
  # each matrix runner tried to flip the draft itself.
  publish-release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Promote draft to published
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # `--repo` is required because this job doesn't actions/checkout —
        # without it `gh` falls back to reading the active repo from a local
        # `.git` and exits non-zero.
        run: gh release edit "$TAG" --draft=false --repo "${{ github.repository }}"
